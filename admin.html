<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PUX 管理后台</title>
  <style>
    :root {
      --primary-color: #07c160;
      --bg-color: #f0f2f5;
      --card-bg: #ffffff;
      --text-main: #1f1f1f;
      --text-sub: #595959;
      --border-color: #f0f0f0;
      --danger: #ff4d4f;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg-color);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 32px 20px;
    }

    .container { max-width: 1200px; margin: 0 auto; }
    header { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; margin-bottom: 28px; }
    h1 { margin: 0; font-size: 28px; }
    .subtitle { margin-top: 8px; color: var(--text-sub); }
    .nav-link { color: var(--primary-color); text-decoration: none; font-weight: 600; }

    .layout { display: grid; grid-template-columns: 360px 1fr; gap: 20px; align-items: start; }
    .panel {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      overflow: hidden;
    }
    .panel-header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .panel-title { font-weight: 700; }
    .member-list { max-height: 680px; overflow: auto; }
    .member-item {
      width: 100%;
      border: 0;
      border-bottom: 1px solid var(--border-color);
      background: white;
      padding: 14px 20px;
      text-align: left;
      cursor: pointer;
      transition: background 0.2s;
    }
    .member-item:hover, .member-item.active { background: #f6ffed; }
    .member-name { font-weight: 700; margin-bottom: 6px; }
    .member-meta { color: var(--text-sub); font-size: 13px; line-height: 1.5; }

    form { padding: 20px; }
    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
    .form-group { margin-bottom: 16px; }
    .form-group.full { grid-column: 1 / -1; }
    label { display: block; margin-bottom: 7px; color: #555; font-weight: 700; font-size: 14px; }
    input, select, textarea {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 11px 12px;
      font-size: 15px;
      font-family: inherit;
      outline-color: var(--primary-color);
      background: white;
    }
    textarea { min-height: 120px; resize: vertical; line-height: 1.6; }
    .actions { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 10px; padding-top: 8px; }
    button {
      border: 0;
      border-radius: 8px;
      padding: 11px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
    }
    button:hover { transform: translateY(-1px); }
    button:disabled { cursor: not-allowed; opacity: 0.6; transform: none; }
    .btn-primary { background: var(--primary-color); color: white; }
    .btn-secondary { background: #eef6ff; color: #1677ff; }
    .btn-danger { background: #fff1f0; color: var(--danger); }
    .message { margin: 0 20px 20px; padding: 12px; border-radius: 8px; display: none; font-size: 14px; }
    .message.success { display: block; background: #f6ffed; color: #389e0d; }
    .message.error { display: block; background: #fff1f0; color: #cf1322; }
    .hint { color: var(--text-sub); font-size: 13px; line-height: 1.6; }
    .history-panel { border-top: 1px solid var(--border-color); padding: 20px; }
    .history-header { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 12px; }
    .history-title { font-weight: 700; }
    .history-list { display: grid; gap: 10px; }
    .history-item { border: 1px solid var(--border-color); border-radius: 10px; padding: 12px; background: #fafafa; }
    .history-meta { color: var(--text-sub); font-size: 12px; margin-bottom: 6px; }
    .history-project { font-weight: 700; margin-bottom: 6px; }
    .history-desc { color: #444; font-size: 13px; line-height: 1.6; white-space: pre-wrap; }
    .history-actions { display: flex; justify-content: flex-end; margin-top: 10px; }
    .mini-form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .mini-form-grid .full { grid-column: 1 / -1; }
    .mini-form-grid textarea { min-height: 74px; font-size: 13px; }
    .mini-form-grid input, .mini-form-grid select { font-size: 13px; }
    .wide-panel { margin-top: 20px; }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      header { flex-direction: column; }
      .form-grid { grid-template-columns: 1fr; }
      .mini-form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>PUX 管理后台</h1>
        <p class="subtitle">维护 PUX 名单、产品业务、PO、阶段和进展。保存后看板会自动同步。</p>
      </div>
      <a class="nav-link" href="/pux-dashboard">返回看板</a>
    </header>

    <div class="layout">
      <section class="panel">
        <div class="panel-header">
          <span class="panel-title">成员名单</span>
          <button class="btn-secondary" type="button" onclick="startCreate()">新增成员</button>
        </div>
        <div id="member-list" class="member-list"></div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <span class="panel-title" id="form-title">编辑成员</span>
          <span class="hint" id="sync-hint">正在加载...</span>
        </div>

        <form id="member-form" onsubmit="saveMember(event)">
          <div class="form-grid">
            <input type="hidden" id="id">

            <div class="form-group">
              <label for="name">PUX 姓名 *</label>
              <input id="name" required placeholder="例如：容若">
            </div>

            <div class="form-group">
              <label for="po_name">对应 PO *</label>
              <input id="po_name" required placeholder="例如：锐仔">
            </div>

            <div class="form-group">
              <label for="product_line">产品/业务 *</label>
              <input id="product_line" required placeholder="例如：Coohom/AINative">
            </div>

            <div class="form-group">
              <label for="current_step">当前阶段</label>
              <select id="current_step">
                <option value="1">Step 1：直接和研发对齐任务</option>
                <option value="2">Step 2：自己产生想法并推进</option>
                <option value="3">Step 3：从想法到 Demo / 推广运营</option>
              </select>
            </div>

            <div class="form-group">
              <label for="status">状态</label>
              <select id="status">
                <option value="in_progress">进行中</option>
                <option value="completed">已达成阶段</option>
              </select>
            </div>

            <div class="form-group">
              <label for="conclusion">当前结论</label>
              <select id="conclusion">
                <option value="顺利进行">顺利进行</option>
                <option value="待观察">待观察</option>
                <option value="遇到阻碍">遇到阻碍</option>
                <option value="刚起步">刚起步</option>
              </select>
            </div>

            <div class="form-group full">
              <label for="project">最新进展标题 / 负责内容</label>
              <input id="project" placeholder="例如：AIHom 整个工具">
            </div>

            <div class="form-group full">
              <label for="execution_process">执行过程 / 最新进展</label>
              <textarea id="execution_process" placeholder="描述工作量变化、产出、卡点、下一步等"></textarea>
            </div>
          </div>

          <p class="hint">提示：产品/业务改名、PO 调整、阶段变化都可以直接保存。看板每 5 秒自动同步一次。</p>

          <div class="actions">
            <button class="btn-danger" id="delete-btn" type="button" onclick="deleteMember()">删除成员</button>
            <button class="btn-secondary" type="button" onclick="resetForm()">重置</button>
            <button class="btn-primary" id="save-btn" type="submit">保存</button>
          </div>
        </form>
        <div class="history-panel" id="history-panel">
          <div class="history-header">
            <span class="history-title">历史记录管理</span>
            <span class="hint" id="history-count">暂无历史记录</span>
          </div>
          <div id="history-list" class="history-list"></div>
        </div>
        <div class="history-panel" id="po-feedback-panel">
          <div class="history-header">
            <span class="history-title">PO 评价历史管理</span>
            <span class="hint" id="po-feedback-count">暂无 PO 评价</span>
          </div>
          <div id="po-feedback-list" class="history-list"></div>
        </div>
        <div id="message" class="message"></div>
      </section>
    </div>

    <section class="panel wide-panel">
      <div class="panel-header">
        <span class="panel-title">Highlights / 转型高光时刻</span>
        <span class="hint" id="highlights-count">暂无高光案例</span>
      </div>
      <div class="history-panel" style="border-top: 0;">
        <div id="highlights-list" class="history-list"></div>
      </div>
    </section>
  </div>

  <script>
    let dashboardData = { pilots: [] };
    let selectedId = '';
    let mode = 'edit';

    const fields = ['id', 'name', 'po_name', 'product_line', 'current_step', 'status', 'conclusion', 'project', 'execution_process'];

    function showMessage(text, type = 'success') {
      const message = document.getElementById('message');
      message.textContent = text;
      message.className = `message ${type}`;
      setTimeout(() => {
        message.className = 'message';
      }, 3500);
    }

    function getFieldValue(id) {
      return document.getElementById(id).value;
    }

    function setFieldValue(id, value) {
      document.getElementById(id).value = value || '';
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function getFormPayload() {
      return {
        id: getFieldValue('id'),
        name: getFieldValue('name'),
        po_name: getFieldValue('po_name'),
        product_line: getFieldValue('product_line'),
        current_step: Number(getFieldValue('current_step') || 1),
        status: getFieldValue('status'),
        conclusion: getFieldValue('conclusion'),
        project: getFieldValue('project'),
        execution_process: getFieldValue('execution_process'),
      };
    }

    function renderList() {
      const list = document.getElementById('member-list');
      if (!dashboardData.pilots.length) {
        list.innerHTML = '<div class="hint" style="padding: 20px;">暂无成员，请新增。</div>';
        return;
      }

      list.innerHTML = dashboardData.pilots.map((pilot) => `
        <button class="member-item ${pilot.id === selectedId ? 'active' : ''}" type="button" onclick="selectMember('${pilot.id}')">
          <div class="member-name">${pilot.name}</div>
          <div class="member-meta">${pilot.product_line || '-'} · PO：${pilot.po_name || '-'}</div>
          <div class="member-meta">Step ${pilot.current_step || 1} · ${pilot.conclusion || '顺利进行'}</div>
        </button>
      `).join('');
    }

    function getSortedHistory(pilot) {
      return (Array.isArray(pilot.history) ? pilot.history : [])
        .map((item, index) => ({ ...item, historyIndex: index }))
        .sort((a, b) => new Date(b.date || 0).getTime() - new Date(a.date || 0).getTime());
    }

    function renderHistory(pilot) {
      const panel = document.getElementById('history-panel');
      const count = document.getElementById('history-count');
      const list = document.getElementById('history-list');

      if (!pilot || !pilot.id || mode === 'create') {
        panel.style.display = 'none';
        return;
      }

      const history = getSortedHistory(pilot);
      panel.style.display = 'block';
      count.textContent = history.length ? `${history.length} 条历史` : '暂无历史记录';
      if (!history.length) {
        list.innerHTML = '<div class="hint">暂无历史记录。提交页或后台保存后会在这里生成记录。</div>';
        return;
      }

      list.innerHTML = history.map((item) => `
        <div class="history-item">
          <div class="history-meta">${escapeHtml(item.date || '未记录日期')} · Step ${escapeHtml(item.step || item.current_step || pilot.current_step || 1)} · ${escapeHtml(item.status || pilot.status || 'in_progress')}</div>
          <div class="history-project">${escapeHtml(item.project || item.action || '阶段进展')}</div>
          <div class="history-desc">${escapeHtml(item.execution_process || item.description || '暂无过程描述')}</div>
          <div class="history-desc">结论：${escapeHtml(item.conclusion || '暂无')}</div>
          <div class="history-actions">
            <button class="btn-danger" type="button" onclick="deleteHistoryItem(${item.historyIndex})">删除这条记录</button>
          </div>
        </div>
      `).join('');
    }

    function getSortedPoFeedback(pilot) {
      return (Array.isArray(pilot.po_feedback) ? pilot.po_feedback : [])
        .map((item, index) => ({ ...item, poFeedbackIndex: index }))
        .sort((a, b) => new Date(b.date || 0).getTime() - new Date(a.date || 0).getTime());
    }

    function renderContinueOptions(value) {
      const options = ['', '愿意继续', '需要调整后继续', '暂不建议继续'];
      return options.map((option) => `
        <option value="${escapeHtml(option)}" ${option === value ? 'selected' : ''}>${escapeHtml(option || '请选择...')}</option>
      `).join('');
    }

    function renderPoFeedbackForm(item, key, isNew = false) {
      return `
        <div class="history-item">
          <div class="history-meta">${isNew ? '新增 PO 评价' : `${escapeHtml(item.date || '未记录日期')} · ${escapeHtml(item.reviewer_name || item.po_name || 'PO')}`}</div>
          <div class="mini-form-grid">
            <div>
              <label for="po-${key}-date">日期</label>
              <input id="po-${key}-date" type="date" value="${escapeHtml(item.date || new Date().toISOString().slice(0, 10))}">
            </div>
            <div>
              <label for="po-${key}-reviewer">评价人</label>
              <input id="po-${key}-reviewer" value="${escapeHtml(item.reviewer_name || '')}" placeholder="例如：锐仔">
            </div>
            <div class="full">
              <label for="po-${key}-goal">业务模块和目标 *</label>
              <textarea id="po-${key}-goal">${escapeHtml(item.business_module_goal || '')}</textarea>
            </div>
            <div class="full">
              <label for="po-${key}-resource">双方磨合 / 协调资源</label>
              <textarea id="po-${key}-resource">${escapeHtml(item.resource_coordination || '')}</textarea>
            </div>
            <div class="full">
              <label for="po-${key}-model">稳定协作模式 *</label>
              <textarea id="po-${key}-model">${escapeHtml(item.collaboration_model || '')}</textarea>
            </div>
            <div>
              <label for="po-${key}-willingness">继续合作意愿 *</label>
              <select id="po-${key}-willingness">${renderContinueOptions(item.continue_willingness || '')}</select>
            </div>
            <div>
              <label for="po-${key}-kpi">KPI 变化</label>
              <textarea id="po-${key}-kpi">${escapeHtml(item.kpi_change || '')}</textarea>
            </div>
            <div class="full">
              <label for="po-${key}-efficiency">协作效率</label>
              <textarea id="po-${key}-efficiency">${escapeHtml(item.efficiency_change || '')}</textarea>
            </div>
            <div class="full">
              <label for="po-${key}-milestone">里程碑评估</label>
              <textarea id="po-${key}-milestone">${escapeHtml(item.milestone_summary || '')}</textarea>
            </div>
          </div>
          <div class="history-actions">
            ${isNew ? '' : `<button class="btn-danger" type="button" onclick="deletePoFeedbackItem(${item.poFeedbackIndex})">删除</button>`}
            <button class="btn-primary" type="button" onclick="savePoFeedbackItem('${key}', ${isNew ? 'null' : item.poFeedbackIndex})">${isNew ? '新增 PO 评价' : '保存这条评价'}</button>
          </div>
        </div>
      `;
    }

    function renderPoFeedbackAdmin(pilot) {
      const panel = document.getElementById('po-feedback-panel');
      const count = document.getElementById('po-feedback-count');
      const list = document.getElementById('po-feedback-list');

      if (!pilot || !pilot.id || mode === 'create') {
        panel.style.display = 'none';
        return;
      }

      const items = getSortedPoFeedback(pilot);
      panel.style.display = 'block';
      count.textContent = items.length ? `${items.length} 条 PO 评价` : '暂无 PO 评价';
      list.innerHTML = [
        renderPoFeedbackForm({ reviewer_name: pilot.po_name || '', date: new Date().toISOString().slice(0, 10) }, 'new', true),
        ...items.map((item) => renderPoFeedbackForm(item, item.poFeedbackIndex))
      ].join('');
    }

    function getSortedHighlights() {
      return (Array.isArray(dashboardData.highlights) ? dashboardData.highlights : [])
        .map((item, index) => ({ ...item, highlightIndex: index }))
        .sort((a, b) => new Date(b.date || 0).getTime() - new Date(a.date || 0).getTime());
    }

    function renderHighlightForm(item, key, isNew = false) {
      return `
        <div class="history-item">
          <div class="history-meta">${isNew ? '新增转型高光' : `${escapeHtml(item.date || '未记录日期')} · ${escapeHtml(item.owner || '未关联成员')}`}</div>
          <div class="mini-form-grid">
            <div>
              <label for="highlight-${key}-date">日期</label>
              <input id="highlight-${key}-date" type="date" value="${escapeHtml(item.date || new Date().toISOString().slice(0, 10))}">
            </div>
            <div>
              <label for="highlight-${key}-owner">相关成员 / 业务</label>
              <input id="highlight-${key}-owner" value="${escapeHtml(item.owner || '')}" placeholder="例如：图伊 / 商业增长">
            </div>
            <div class="full">
              <label for="highlight-${key}-title">大标题 *</label>
              <input id="highlight-${key}-title" value="${escapeHtml(item.title || '')}" placeholder="例如：从方案设计到代码落地的完整闭环">
            </div>
            <div class="full">
              <label for="highlight-${key}-subtitle">小标题</label>
              <input id="highlight-${key}-subtitle" value="${escapeHtml(item.subtitle || '')}" placeholder="例如：PUX 主动推进带来的效率提升">
            </div>
            <div class="full">
              <label for="highlight-${key}-body">正文 *</label>
              <textarea id="highlight-${key}-body" placeholder="描述案例背景、做法、结果和可复用经验">${escapeHtml(item.body || '')}</textarea>
            </div>
          </div>
          <div class="history-actions">
            ${isNew ? '' : `<button class="btn-danger" type="button" onclick="deleteHighlightItem(${item.highlightIndex})">删除</button>`}
            <button class="btn-primary" type="button" onclick="saveHighlightItem('${key}', ${isNew ? 'null' : item.highlightIndex})">${isNew ? '新增高光案例' : '保存这条高光'}</button>
          </div>
        </div>
      `;
    }

    function renderHighlightsAdmin() {
      const count = document.getElementById('highlights-count');
      const list = document.getElementById('highlights-list');
      const items = getSortedHighlights();
      count.textContent = items.length ? `${items.length} 条高光案例` : '暂无高光案例';
      list.innerHTML = [
        renderHighlightForm({ date: new Date().toISOString().slice(0, 10) }, 'new', true),
        ...items.map((item) => renderHighlightForm(item, item.highlightIndex))
      ].join('');
    }

    function fillForm(pilot) {
      fields.forEach((field) => setFieldValue(field, pilot[field]));
      setFieldValue('current_step', pilot.current_step || 1);
      setFieldValue('status', pilot.status || 'in_progress');
      setFieldValue('conclusion', pilot.conclusion || '顺利进行');
      document.getElementById('delete-btn').style.display = pilot.id ? 'inline-block' : 'none';
      renderHistory(pilot);
      renderPoFeedbackAdmin(pilot);
    }

    function selectMember(id) {
      const pilot = dashboardData.pilots.find((item) => item.id === id);
      if (!pilot) return;
      selectedId = id;
      mode = 'edit';
      document.getElementById('form-title').textContent = `编辑成员：${pilot.name}`;
      fillForm(pilot);
      renderList();
    }

    function startCreate() {
      selectedId = '';
      mode = 'create';
      document.getElementById('form-title').textContent = '新增 PUX 成员';
      fillForm({
        current_step: 1,
        status: 'in_progress',
        conclusion: '顺利进行',
      });
      renderHistory(null);
      renderPoFeedbackAdmin(null);
      renderList();
    }

    function resetForm() {
      if (mode === 'create') {
        startCreate();
      } else if (selectedId) {
        selectMember(selectedId);
      }
    }

    async function loadData() {
      const response = await fetch('/api/pux/data', { cache: 'no-store' });
      if (!response.ok) throw new Error('加载数据失败');
      dashboardData = await response.json();
      dashboardData.pilots = Array.isArray(dashboardData.pilots) ? dashboardData.pilots : [];
      dashboardData.highlights = Array.isArray(dashboardData.highlights) ? dashboardData.highlights : [];
      document.getElementById('sync-hint').textContent = `已加载 ${dashboardData.pilots.length} 位成员`;
      renderHighlightsAdmin();

      if (selectedId && dashboardData.pilots.some((item) => item.id === selectedId)) {
        selectMember(selectedId);
      } else if (dashboardData.pilots.length) {
        selectMember(dashboardData.pilots[0].id);
      } else {
        startCreate();
      }
    }

    async function callAdmin(action, payload) {
      const response = await fetch('/api/pux/admin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, payload }),
      });
      const result = await response.json();
      if (!response.ok || !result.success) {
        throw new Error(result.message || '操作失败');
      }
      return result;
    }

    async function saveMember(event) {
      event.preventDefault();
      const saveBtn = document.getElementById('save-btn');
      saveBtn.disabled = true;
      try {
        const payload = getFormPayload();
        const action = mode === 'create' ? 'create' : 'update';
        const result = await callAdmin(action, payload);
        dashboardData = result.data;
        selectedId = action === 'create'
          ? result.data.pilots[result.data.pilots.length - 1].id
          : payload.id;
        mode = 'edit';
        showMessage(result.writable ? '已保存，线上看板会自动同步' : '已保存到请求中，但 Supabase 未配置，线上不会持久化', result.writable ? 'success' : 'error');
        await loadData();
      } catch (error) {
        showMessage(error.message, 'error');
      } finally {
        saveBtn.disabled = false;
      }
    }

    async function deleteMember() {
      const payload = getFormPayload();
      if (!payload.id) return;
      if (!confirm(`确认删除 ${payload.name} 吗？此操作会从看板名单中移除。`)) return;

      try {
        const result = await callAdmin('delete', { id: payload.id });
        dashboardData = result.data;
        selectedId = '';
        showMessage('已删除成员，看板会自动同步');
        await loadData();
      } catch (error) {
        showMessage(error.message, 'error');
      }
    }

    async function deleteHistoryItem(historyIndex) {
      if (!selectedId) return;
      const pilot = dashboardData.pilots.find((item) => item.id === selectedId);
      if (!pilot) return;
      if (!confirm(`确认删除 ${pilot.name} 的这条历史记录吗？如果它是当前最新进展，看板会回退到上一条记录。`)) return;

      try {
        const result = await callAdmin('delete_history', { id: selectedId, historyIndex });
        dashboardData = result.data;
        showMessage('已删除历史记录，看板会自动同步');
        await loadData();
      } catch (error) {
        showMessage(error.message, 'error');
      }
    }

    function getPoFeedbackPayload(key) {
      return {
        date: document.getElementById(`po-${key}-date`).value,
        reviewer_name: document.getElementById(`po-${key}-reviewer`).value,
        business_module_goal: document.getElementById(`po-${key}-goal`).value,
        resource_coordination: document.getElementById(`po-${key}-resource`).value,
        collaboration_model: document.getElementById(`po-${key}-model`).value,
        continue_willingness: document.getElementById(`po-${key}-willingness`).value,
        kpi_change: document.getElementById(`po-${key}-kpi`).value,
        efficiency_change: document.getElementById(`po-${key}-efficiency`).value,
        milestone_summary: document.getElementById(`po-${key}-milestone`).value,
      };
    }

    async function savePoFeedbackItem(key, poFeedbackIndex) {
      if (!selectedId) return;
      try {
        const result = await callAdmin('save_po_feedback', {
          id: selectedId,
          poFeedbackIndex,
          feedback: getPoFeedbackPayload(key),
        });
        dashboardData = result.data;
        showMessage('已保存 PO 评价，看板会自动同步');
        await loadData();
      } catch (error) {
        showMessage(error.message, 'error');
      }
    }

    async function deletePoFeedbackItem(poFeedbackIndex) {
      if (!selectedId) return;
      if (!confirm('确认删除这条 PO 评价吗？')) return;
      try {
        const result = await callAdmin('delete_po_feedback', { id: selectedId, poFeedbackIndex });
        dashboardData = result.data;
        showMessage('已删除 PO 评价，看板会自动同步');
        await loadData();
      } catch (error) {
        showMessage(error.message, 'error');
      }
    }

    function getHighlightPayload(key) {
      return {
        date: document.getElementById(`highlight-${key}-date`).value,
        owner: document.getElementById(`highlight-${key}-owner`).value,
        title: document.getElementById(`highlight-${key}-title`).value,
        subtitle: document.getElementById(`highlight-${key}-subtitle`).value,
        body: document.getElementById(`highlight-${key}-body`).value,
      };
    }

    async function saveHighlightItem(key, highlightIndex) {
      try {
        const result = await callAdmin('save_highlight', {
          highlightIndex,
          highlight: getHighlightPayload(key),
        });
        dashboardData = result.data;
        dashboardData.highlights = Array.isArray(dashboardData.highlights) ? dashboardData.highlights : [];
        showMessage('已保存高光案例，看板会自动同步');
        renderHighlightsAdmin();
      } catch (error) {
        showMessage(error.message, 'error');
      }
    }

    async function deleteHighlightItem(highlightIndex) {
      if (!confirm('确认删除这条转型高光案例吗？')) return;
      try {
        const result = await callAdmin('delete_highlight', { highlightIndex });
        dashboardData = result.data;
        dashboardData.highlights = Array.isArray(dashboardData.highlights) ? dashboardData.highlights : [];
        showMessage('已删除高光案例，看板会自动同步');
        renderHighlightsAdmin();
      } catch (error) {
        showMessage(error.message, 'error');
      }
    }

    loadData().catch((error) => {
      document.getElementById('sync-hint').textContent = '加载失败';
      showMessage(error.message, 'error');
    });
  </script>
</body>
</html>
